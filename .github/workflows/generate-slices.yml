name: Generate Slice Code

on:
  push:
    paths:
      - '.eventmodel/config.json'
      - '.eventmodel2/config.json'

  workflow_dispatch:
    inputs:
      em_dir:
        description: 'Event model directory (.eventmodel or .eventmodel2)'
        required: false
        default: '.eventmodel'
      context:
        description: 'Only process a specific context (leave empty for all)'
        required: false
        default: ''
      provider:
        description: 'AI provider: anthropic (direct API) or bedrock (AWS)'
        required: false
        default: 'anthropic'
      model:
        description: 'AI model: auto (routes per slice), opus (all slices), or sonnet (all slices)'
        required: false
        default: 'auto'
      mode:
        description: 'Mode: live or simulate (dry-run, no AI, no PRs)'
        required: false
        default: 'live'

permissions:
  contents: write
  pull-requests: write
  issues: write
  discussions: write

concurrency:
  group: codegen-${{ github.ref }}
  cancel-in-progress: true

# ═══════════════════════════════════════════════════════════════════
# Phase 0: Plan — fully deterministic
#   detect → scaffold → risk score → policy decisions → matrix
# ═══════════════════════════════════════════════════════════════════
jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix:       ${{ steps.policy.outputs.matrix }}
      has_contexts: ${{ steps.policy.outputs.has_contexts }}
      mode:         ${{ steps.detect.outputs.mode }}
      em_dir:       ${{ steps.detect.outputs.em_dir }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-env

      - name: Detect + gate
        id: detect
        run: |
          python3 .ci/stages/detect.py \
            --em-dir "${{ inputs.em_dir || '' }}" \
            --event-name "${{ github.event_name }}" \
            --before "${{ github.event.before }}" \
            --mode "${{ inputs.mode || 'live' }}"

      - name: "Split → Diff → Scaffold → Plan"
        if: steps.detect.outputs.changed == 'true'
        id: scaffold
        run: |
          python3 .ci/stages/scaffold.py \
            --root . \
            --em-dir "${{ steps.detect.outputs.em_dir }}" \
            --base-branch "${{ github.ref_name }}" \
            --context "${{ inputs.context || '' }}"

      - name: Risk score
        if: steps.detect.outputs.changed == 'true' && steps.scaffold.outputs.has_contexts == 'true'
        run: |
          python3 .ci/stages/risk_score.py \
            --root . \
            --em-dir "${{ steps.detect.outputs.em_dir }}" \
            --generate-output /tmp/generate-output.json

      - name: Policy decisions
        if: steps.detect.outputs.changed == 'true' && steps.scaffold.outputs.has_contexts == 'true'
        id: policy
        run: |
          python3 .ci/stages/policy_decide.py \
            --risk-scores /tmp/risk-scores.json \
            --generate-output /tmp/generate-output.json \
            --trigger "${{ github.event_name }}" \
            --model-override "${{ inputs.model || 'auto' }}" \
            --provider "${{ inputs.provider || 'anthropic' }}"

      - name: Validate matrix
        if: steps.detect.outputs.changed == 'true' && steps.policy.outputs.has_contexts == 'true'
        run: |
          echo '${{ steps.policy.outputs.matrix }}' | python3 .ci/validate_matrix.py

      - name: Upload scaffolded workspace
        if: steps.detect.outputs.changed == 'true' && steps.policy.outputs.has_contexts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scaffolded-workspace
          path: |
            src/BusinessCapabilities/
            .eventmodel/
            .eventmodel2/
          retention-days: 1

      - name: Upload plan decisions
        if: steps.detect.outputs.changed == 'true' && steps.policy.outputs.has_contexts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: plan-decisions
          path: |
            /tmp/decisions.json
            /tmp/risk-scores.json
            /tmp/audit.jsonl
          retention-days: 1

      - name: Simulation report
        if: steps.detect.outputs.mode == 'simulate' && steps.policy.outputs.has_contexts == 'true'
        run: |
          echo "## Simulation Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/decisions.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Risk Scores" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/risk-scores.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ═══════════════════════════════════════════════════════════════
  # Phase 1–3: Implement → Verify → Deliver (one job per context)
  # ═══════════════════════════════════════════════════════════════
  codegen:
    needs: plan
    if: >-
      needs.plan.outputs.has_contexts == 'true' &&
      needs.plan.outputs.mode == 'live'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
      max-parallel: 2
      fail-fast: false

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ matrix.base_branch }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-env

      - name: Download scaffolded workspace
        uses: actions/download-artifact@v4
        with:
          name: scaffolded-workspace

      - name: Download plan decisions
        uses: actions/download-artifact@v4
        with:
          name: plan-decisions
          path: /tmp

      # ── Signed commits setup ────────────────────────────────
      - name: "🔑 Configure signed commits"
        env:
          SSH_SIGNING_KEY: ${{ secrets.BOT_SSH_SIGNING_KEY }}
        run: |
          # Write the SSH signing key to disk — use env var to preserve newlines
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key

          # Configure git for SSH signing
          BOT_NAME="${{ secrets.BOT_GIT_NAME }}"
          BOT_EMAIL="${{ secrets.BOT_GIT_EMAIL }}"
          git config user.name "${BOT_NAME:-evdb-codegen-bot}"
          git config user.email "${BOT_EMAIL:-evdb-codegen-bot@users.noreply.github.com}"
          git config gpg.format ssh
          git config user.signingkey ~/.ssh/signing_key
          git config commit.gpgsign true

      - name: Create codegen branch
        run: |
          git fetch origin "${{ matrix.branch }}" 2>/dev/null || true
          git checkout -B "${{ matrix.branch }}"

      - name: Commit scaffold
        run: |
          git add "src/BusinessCapabilities/${{ matrix.context_pascal }}/" || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(${{ matrix.context_pascal }}): scaffold boilerplate

          Deterministic scaffold output for slices: ${{ matrix.slices }}
          Generated by evdb-scaffold (no AI)."
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.105

      # ── Load prior learning ─────────────────────────────────
      - name: "📚 Load prior discoveries"
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          # Download learned discoveries from the most recent successful run
          # so hint retrieval can use patterns from prior implementations
          LATEST_RUN=$(gh run list --workflow generate-slices.yml --status completed --conclusion success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$LATEST_RUN" ]; then
            gh run download "$LATEST_RUN" --name "run-${{ matrix.context_pascal }}" --dir /tmp/prior-run 2>/dev/null || true
            if [ -f "/tmp/prior-run/learned-discoveries.json" ]; then
              cp /tmp/prior-run/learned-discoveries.json /tmp/learned-discoveries.json
              COUNT=$(python3 -c "import json; d=json.load(open('/tmp/learned-discoveries.json')); print(d.get('record_count', len(d.get('records', []))))" 2>/dev/null || echo "0")
              echo "  Loaded $COUNT discovery records from run $LATEST_RUN"
            else
              echo "  No prior discoveries found"
            fi
          else
            echo "  No prior successful runs found"
          fi

      # ── Load clarification answers from Discussions + prior PR ─
      - name: "💬 Load clarification answers"
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          # Try Discussions first (preferred — threaded, searchable)
          python3 .ci/stages/manage_discussions.py \
            --mode read \
            --repo "${{ github.repository }}" \
            --context "${{ matrix.context_pascal }}" || true

          # Fallback: load from prior PR comments if no Discussion answers found
          if [ ! -s /tmp/pr-clarification-answers.txt ]; then
            BRANCH_PREFIX="${{ matrix.base_branch }}-codegen/${{ matrix.context_pascal }}"
            PR_NUM=$(gh pr list --head "$BRANCH_PREFIX" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -z "$PR_NUM" ]; then
              PR_NUM=$(gh pr list --head "$BRANCH_PREFIX" --state closed --limit 1 --json number --jq '.[0].number' 2>/dev/null || echo "")
            fi

            if [ -n "$PR_NUM" ]; then
              echo "  Fallback: checking PR #$PR_NUM for clarification answers"
              gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
                --jq '.[] | select(.user.type != "Bot") | "### Comment by @\(.user.login) (\(.created_at))\n\(.body)\n"' \
                > /tmp/pr-clarification-answers.txt 2>/dev/null || true
            fi
          fi

      # ── Phase 1: AI implementation ──────────────────────────
      - name: "🧠 Implement slices"
        id: implement
        timeout-minutes: 25
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION || 'us-east-1' }}
          GITHUB_RUN_ID:         ${{ github.run_id }}
        run: |
          python3 .ci/stages/implement_slice.py \
            --root . \
            --context "${{ matrix.context_pascal }}" \
            --slices "${{ matrix.slices }}" \
            --decisions /tmp/decisions.json \
            --provider "${{ inputs.provider || 'anthropic' }}"

      - name: Cost guardrail
        if: always() && steps.implement.outputs.cost != ''
        run: |
          COST="${{ steps.implement.outputs.cost }}"
          if [ -n "$COST" ] && (( $(echo "$COST > 5.00" | bc -l 2>/dev/null || echo 0) )); then
            echo "::warning::Cost \$$COST exceeds \$5 threshold"
          fi

      # ── Phase 2: Verify + repair ────────────────────────────
      - name: "🔍 Verify + test"
        id: verify
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 .ci/stages/verify_and_test.py \
            --root . --context "${{ matrix.context_pascal }}"

      - name: "🔧 Classify + repair"
        id: repair
        if: steps.verify.outputs.passed != 'true'
        env:
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION || 'us-east-1' }}
          GITHUB_RUN_ID:         ${{ github.run_id }}
        run: |
          python3 .ci/stages/classify.py \
            --verify /tmp/verify-results.json \
            --test-output /tmp/test-output.txt \
            --context "${{ matrix.context_pascal }}"

          python3 .ci/stages/repair.py \
            --classification /tmp/classification.json \
            --decisions /tmp/decisions.json \
            --root . \
            --context "${{ matrix.context_pascal }}" \
            --provider "${{ inputs.provider || 'anthropic' }}"

      # ── Phase 3: Assess + deliver ───────────────────────────
      - name: "📊 Score confidence"
        if: always()
        id: confidence
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 .ci/stages/score_confidence.py \
            --verify /tmp/verify-results.json \
            --test-passed "${{ steps.verify.outputs.test_passed || 'false' }}" \
            --slices "${{ matrix.slices }}" \
            --classification /tmp/classification.json \
            --repair /tmp/repair-results.json \
            --claude-stats /tmp/claude-stats.json

      - name: "📈 Collect metrics"
        if: always()
        run: |
          python3 .ci/stages/collect_metrics.py \
            --context "${{ matrix.context_pascal }}" \
            --slices "${{ matrix.slices }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --provider "${{ inputs.provider || 'anthropic' }}" \
            --duration "${{ steps.implement.outputs.duration }}" \
            --root . \
            --verify /tmp/verify-results.json \
            --test-passed "${{ steps.verify.outputs.test_passed || 'false' }}" \
            --classification /tmp/classification.json \
            --repair /tmp/repair-results.json \
            --confidence /tmp/confidence.json \
            --claude-stats /tmp/claude-stats.json \
            --output /tmp/slice-metrics.jsonl \
          2>/dev/null || true

      - name: "📝 Job summary"
        if: always()
        run: |
          python3 .ci/render/job_summary.py \
            --summary-path "$GITHUB_STEP_SUMMARY" \
            --context "${{ matrix.context_pascal }}" \
            --duration "${{ steps.implement.outputs.duration }}" \
            --cost "${{ steps.implement.outputs.cost }}" \
            --turns "${{ steps.implement.outputs.num_turns }}" \
            --repaired "${{ steps.repair.outputs.total_repaired || '0' }}" \
            --max-repair-level "${{ steps.repair.outputs.max_repair_level || '0' }}"

      - name: "🧠 Learn from success"
        if: steps.verify.outputs.verify_passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          # Download prior discoveries from the most recent successful run (if any)
          # This enables cross-run deduplication and reuse tracking
          PRIOR_FLAG=""
          PRIOR_PATH="/tmp/prior-discoveries.json"
          LATEST_RUN=$(gh run list --workflow generate-slices.yml --status completed --conclusion success --limit 1 --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [ -n "$LATEST_RUN" ]; then
            gh run download "$LATEST_RUN" --name "run-${{ matrix.context_pascal }}" --dir /tmp/prior-run 2>/dev/null || true
            if [ -f "/tmp/prior-run/learned-discoveries.json" ]; then
              cp /tmp/prior-run/learned-discoveries.json "$PRIOR_PATH"
              PRIOR_FLAG="--prior-discoveries $PRIOR_PATH"
              echo "  Using prior discoveries from run $LATEST_RUN"
            fi
          fi

          python3 .ci/stages/learn.py \
            --root . \
            --context "${{ matrix.context_pascal }}" \
            --slices "${{ matrix.slices }}" \
            --verify-passed "${{ steps.verify.outputs.verify_passed || 'false' }}" \
            --test-passed "${{ steps.verify.outputs.test_passed || 'false' }}" \
            $PRIOR_FLAG

      - name: "📌 Stamp implementation hashes"
        if: steps.verify.outputs.verify_passed == 'true'
        run: |
          STAMP_SCRIPT=".claude/skills/evdb-dev-v2/scripts/stamp_hash.py"
          if [ -f "$STAMP_SCRIPT" ]; then
            IFS=',' read -ra SLICE_ARRAY <<< "${{ matrix.slices }}"
            for SLICE in "${SLICE_ARRAY[@]}"; do
              echo "  Stamping: $SLICE"
              python3 "$STAMP_SCRIPT" --root . --slice "$SLICE" || true
            done
            echo "  Hashes:"
            cat .implementation-hashes/*.json 2>/dev/null || echo "  (no hash files created)"
          fi

      # ── Clean + commit + PR ─────────────────────────────────
      - name: Clean up
        run: |
          find "src/BusinessCapabilities/${{ matrix.context_pascal }}/" \
            -name "TODO_CONTEXT.md" -delete 2>/dev/null || true

      - name: Commit business logic
        run: |
          git add "src/BusinessCapabilities/${{ matrix.context_pascal }}/" || true
          git add ".implementation-hashes/" || true
          # Remove event model files from the branch — they should not be merged
          # into the target branch. The source of truth is Miro, not the repo.
          git rm -rf .eventmodel/ .eventmodel2/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "feat(${{ matrix.context_pascal }}): implement slice business logic

          Slices: ${{ matrix.slices }}

          AI-generated:
          - Predicate logic in gwts.ts
          - Command handler branching in commandHandler.ts
          - Enrichment logic (where applicable)
          - Tests verified

          Co-Authored-By: Claude Code <noreply@anthropic.com>"
          fi

      - name: "📋 Diff summary"
        if: steps.confidence.outputs.worst_band != 'BLOCKED'
        run: |
          python3 .ci/render/diff_summary.py \
            --context "${{ matrix.context_pascal }}" \
            --base-branch "${{ matrix.base_branch }}"

      - name: "🚀 Push + create PR"
        if: steps.confidence.outputs.worst_band != 'BLOCKED'
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          # Skip if no commits ahead of base
          AHEAD=$(git rev-list --count "${{ matrix.base_branch }}".."${{ matrix.branch }}" 2>/dev/null || echo "0")
          if [ "$AHEAD" = "0" ]; then
            echo "No commits ahead of ${{ matrix.base_branch }} — skipping PR"
            exit 0
          fi

          DRAFT_FLAG=""
          WORST="${{ steps.confidence.outputs.worst_band }}"
          PR_MODE="${{ matrix.pr_mode }}"
          if [ "$WORST" = "LOW" ] || [ "$WORST" = "MEDIUM" ] || [ "$PR_MODE" = "draft" ]; then
            DRAFT_FLAG="--draft"
          fi

          git push --force-with-lease -u origin "${{ matrix.branch }}"

          EXISTING=$(gh pr list --head "${{ matrix.branch }}" --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists — branch updated"
            exit 0
          fi

          # Confidence emoji in PR title
          WORST="${{ steps.confidence.outputs.worst_band }}"
          AVG="${{ steps.confidence.outputs.avg_score }}"
          case "$WORST" in
            HIGH)   EMOJI="🟢" ;;
            MEDIUM) EMOJI="🟡" ;;
            LOW)    EMOJI="🟠" ;;
            *)      EMOJI="🔴" ;;
          esac

          PR_BODY=$(python3 .ci/render/pr_body.py \
            --context "${{ matrix.context }}" \
            --slices "${{ matrix.slices }}" \
            --base-branch "${{ matrix.base_branch }}")

          PR_URL=$(gh pr create $DRAFT_FLAG \
            --title "$EMOJI feat(${{ matrix.context_pascal }}): implement planned slices — $WORST ($AVG)" \
            --body "$PR_BODY" \
            --base "${{ matrix.base_branch }}")

          echo "$PR_URL"
          PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')

          # Assign reviewers from repo variable (comma-separated GitHub usernames)
          # Set via: gh variable set PR_REVIEWERS --repo <repo> --body "user1,user2"
          REVIEWERS="${{ vars.PR_REVIEWERS }}"
          if [ -n "$REVIEWERS" ] && [ -n "$PR_NUM" ]; then
            gh pr edit "$PR_NUM" --add-reviewer "$REVIEWERS" 2>/dev/null || echo "  Could not assign reviewers: $REVIEWERS"
          fi

      - name: "💬 Stats comment"
        if: always() && steps.confidence.outputs.worst_band != 'BLOCKED'
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          # Skip if no PR exists for this branch
          PR_NUM=$(gh pr list --head "${{ matrix.branch }}" --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR_NUM" ]; then
            echo "No PR found — skipping comment"
            exit 0
          fi

          COMMENT=$(python3 .ci/render/pr_comment.py \
            --context "${{ matrix.context }}" \
            --slices "${{ matrix.slices }}" \
            --duration "${{ steps.implement.outputs.duration }}" \
            --run-id "${{ github.run_id }}" \
            --run-number "${{ github.run_number }}" \
            --repo "${{ github.repository }}" \
            --worst-band "${{ steps.confidence.outputs.worst_band }}" \
            --avg-score "${{ steps.confidence.outputs.avg_score }}" \
            --repaired "${{ steps.repair.outputs.total_repaired || '0' }}")
          gh pr comment "${{ matrix.branch }}" --body "$COMMENT"

      - name: "💬 Create clarification Discussions"
        if: always() && steps.confidence.outputs.worst_band != 'BLOCKED'
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          if [ -s /tmp/clarifications.json ]; then
            python3 .ci/stages/manage_discussions.py \
              --mode create \
              --repo "${{ github.repository }}" || echo "  Discussion creation failed (non-fatal)"
          else
            echo "  No clarifications — skipping Discussion creation"
          fi

      - name: Create issue (L4 escalation)
        if: steps.repair.outputs.human_escalation == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Manual repair needed: ${{ matrix.context_pascal }}" \
            --body "Repair ladder exhausted (L4). See run #${{ github.run_number }}." \
            --label "codegen-escalation"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ matrix.context_pascal }}
          path: |
            /tmp/slice-metrics.jsonl
            /tmp/confidence.json
            /tmp/repair-results.json
            /tmp/risk-scores.json
            /tmp/decisions.json
            /tmp/audit.jsonl
            /tmp/learned-discoveries.json
            /tmp/learned-discoveries.updated.json
            /tmp/clarifications.json
            /tmp/test-results.json
            /tmp/discussion-links.json
            /tmp/diff-summary.json
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════
  # Phase 4: Aggregate — seal audit across all contexts
  # ═══════════════════════════════════════════════════════════════
  aggregate:
    needs: [plan, codegen]
    if: always() && needs.plan.outputs.has_contexts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-env

      - name: Download all run artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: run-*
          merge-multiple: true

      - name: Finalize audit
        run: |
          python3 .ci/stages/finalize_audit.py \
            --run-id "${{ github.run_id }}"

      - name: Upload sealed audit
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ github.run_id }}
          path: /tmp/audit-bundle.json
          retention-days: 90
